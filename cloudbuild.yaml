# Layer-cached build: pulls the previous image and reuses unchanged layers
# (pip deps + 190 MB model download), so code-only builds take ~1-2 min.
steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args: ["-c", "docker pull gcr.io/$PROJECT_ID/payback-assistant:latest || true"]
  - name: gcr.io/cloud-builders/docker
    args: ["build", "--cache-from", "gcr.io/$PROJECT_ID/payback-assistant:latest",
           "-t", "gcr.io/$PROJECT_ID/payback-assistant:latest", "."]
images: ["gcr.io/$PROJECT_ID/payback-assistant:latest"]
timeout: 1200s
